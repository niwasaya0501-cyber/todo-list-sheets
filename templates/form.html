{% extends "base.html" %}
{% block title %}{{ "やることを編集" if mode == "edit" else "やることを登録" }}{% endblock %}
{% block content %}
  <h2>{{ "やることを編集" if mode == "edit" else "新しいやることを登録" }}</h2>

  {% if error %}
    <p class="alert alert-error">{{ error }}</p>
  {% endif %}

  <form method="post" class="todo-form">
    <label for="title">タイトル <span class="required">*</span></label>
    <input type="text" id="title" name="title" value="{{ todo.title or '' }}" required>

    <label for="content">内容</label>
    <textarea id="content" name="content" rows="5">{{ todo.content or '' }}</textarea>

    <label for="due_date">期日</label>
    <input type="date" id="due_date" name="due_date" value="{{ todo.due_date or '' }}">

    <label for="category">カテゴリ</label>
    <select id="category" name="category">
      {% for cat in categories %}
        <option value="{{ cat }}" {{ "selected" if todo.category == cat else "" }}>{{ cat }}</option>
      {% endfor %}
    </select>

    <label for="priority">重要度</label>
    <select id="priority" name="priority">
      {% for p in priorities %}
        <option value="{{ p }}" {{ "selected" if todo.priority == p else "" }}>{{ p }}</option>
      {% endfor %}
    </select>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ "更新する" if mode == "edit" else "登録する" }}</button>
      <a class="btn" href="{{ url_for('index') }}">キャンセル</a>
    </div>
  </form>
{% endblock %}
